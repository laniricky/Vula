version: '3.8'

services:
  vula-api:
    build: ./backend
    ports:
      - "8081:8080"
    environment:
      - DB_URL=postgres://vula_admin:secure_password@postgres:5432/vula?sslmode=disable
      - REDIS_URL=redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=vula_admin
      - MINIO_ROOT_PASSWORD=secure_password
      - MINIO_PUBLIC_HOST=http://localhost:9000
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production_use_long_random_string}
      - GO_ENV=${GO_ENV:-development}
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vula_admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: vula
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: vula_admin
      MINIO_ROOT_PASSWORD: secure_password
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  redis_data:
  minio_data:
